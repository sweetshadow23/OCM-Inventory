<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OCM Inventory</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--bg2:#161B27;--bg3:#1E2535;
  --surface:#1A2030;--surface2:#222A3A;--surface3:#2A3347;
  --accent:#4F8EF7;--accent2:#3B7AE8;
  --accent-glow:rgba(79,142,247,0.18);
  --green:#34D399;--green-bg:rgba(52,211,153,0.12);--green-text:#34D399;
  --amber:#FBBF24;--amber-bg:rgba(251,191,36,0.12);--amber-text:#FBBF24;
  --red:#F87171;--red-bg:rgba(248,113,113,0.12);--red-text:#F87171;
  --teal:#2DD4BF;--teal-bg:rgba(45,212,191,0.12);--teal-text:#2DD4BF;
  --text:#E8EDF5;--text2:#8B96AA;--text3:#4E5A6E;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 4px 32px rgba(0,0,0,0.5);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
h2{font-size:16px;font-weight:600;letter-spacing:-.2px}
h3{font-size:14px;font-weight:500}
input,select{font-family:var(--font);font-size:13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px;color:var(--text);width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3)}
button{font-family:var(--font);font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);padding:8px 16px;transition:all .18s;font-weight:500}
button:hover{background:var(--surface3);border-color:rgba(255,255,255,0.14)}
button:active{transform:scale(.98)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(79,142,247,0.28)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2);box-shadow:0 4px 20px rgba(79,142,247,0.38)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-danger{background:var(--red-bg);border-color:rgba(248,113,113,0.25);color:var(--red)}
.btn-danger:hover{background:rgba(248,113,113,0.2)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.card-flush{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-low{background:var(--amber-bg);color:var(--amber-text)}
.badge-out{background:var(--red-bg);color:var(--red-text)}
.badge-admin{background:var(--accent-glow);color:var(--accent)}
.badge-staff{background:var(--teal-bg);color:var(--teal-text)}
.badge-restock{background:var(--green-bg);color:var(--green-text)}
.badge-taken{background:var(--amber-bg);color:var(--amber-text)}
label{font-size:11px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--bg2)}
td{padding:11px 16px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#3B7AE8,#4F8EF7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 10px rgba(79,142,247,0.3)}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.4px}
.logo-text span{color:var(--accent)}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.1em;margin-top:1px;text-transform:uppercase}
.user-chip{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px}
.tab-btn{padding:12px 18px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;font-family:var(--font)}
.tab-btn:hover{color:var(--text2);background:transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:22px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--al,var(--accent))}
.stat-val{font-size:28px;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-.5px}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.alert{padding:11px 15px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;font-weight:500;display:flex;align-items:center;gap:8px;border:1px solid transparent}
.alert-success{background:var(--green-bg);color:var(--green-text);border-color:rgba(52,211,153,0.2)}
.alert-error{background:var(--red-bg);color:var(--red-text);border-color:rgba(248,113,113,0.2)}
.alert-info{background:var(--accent-glow);color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.empty-state{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-state .icon{font-size:32px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.qty-input-wrap{display:flex;gap:6px;align-items:center}
.qty-input-wrap input{width:72px}
.cat-pill{font-size:11px;background:var(--surface3);color:var(--text2);padding:2px 9px;border-radius:20px}

/* LOGIN */
.login-bg{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
  background:var(--bg);
  background-image:radial-gradient(ellipse at 25% 60%,rgba(79,142,247,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at 75% 20%,rgba(167,139,250,0.05) 0%,transparent 50%);
}
.login-card{
  width:100%;max-width:400px;
  background:var(--surface);border:1px solid var(--border2);
  border-radius:var(--radius-xl);padding:2.5rem 2rem;
  box-shadow:var(--shadow);
  animation:fadeUp .38s cubic-bezier(.22,1,.36,1);
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo-wrap{
  width:60px;height:60px;
  background:linear-gradient(135deg,#3B7AE8,#6366F1);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  margin:0 auto 1.5rem;font-size:28px;
  box-shadow:0 8px 28px rgba(79,142,247,0.35);
}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.5px;text-align:center;color:var(--text)}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-top:6px;letter-spacing:.04em}
.login-divider{height:1px;background:var(--border);margin:1.75rem 0}
.login-btn{
  width:100%;padding:12px;font-size:14px;font-weight:600;letter-spacing:.01em;
  background:var(--accent);border-color:var(--accent);color:#fff;
  border-radius:var(--radius);margin-top:6px;
  box-shadow:0 4px 18px rgba(79,142,247,0.35);
  transition:all .2s;
}
.login-btn:hover{background:var(--accent2);box-shadow:0 6px 26px rgba(79,142,247,0.45);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.login-footer{margin-top:2rem;text-align:center;font-size:10px;color:var(--text3);letter-spacing:.07em;text-transform:uppercase}

/* SETUP */
.setup-panel{background:rgba(251,191,36,0.07);border:1px solid rgba(251,191,36,0.18);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.setup-panel h3{color:var(--amber);margin-bottom:8px}
.setup-steps{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.setup-step{background:rgba(255,255,255,0.04);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2)}
.setup-step strong{display:block;font-size:10px;margin-bottom:2px;color:var(--amber);text-transform:uppercase;letter-spacing:.06em}
.edit-card{border:1px solid rgba(79,142,247,0.22)!important;background:rgba(79,142,247,0.04)!important}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .topbar{padding:10px 14px}
  .content{padding:14px}
  .tabs-bar{padding:0 14px;overflow-x:auto}
  .user-chip .user-name{display:none}
  .login-card{padding:2rem 1.25rem}
}
</style>
</head>
<body>
<div id="app">
  <div class="loading-screen">
    <div class="spinner"></div>
    <span style="font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:4px">INITIALIZING SYSTEM</span>
  </div>
</div>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrb4POFjh32drdjet77ZNg3PvNlY7LZg",
  authDomain: "sweetshadow-237de.firebaseapp.com",
  databaseURL: "https://sweetshadow-237de-default-rtdb.firebaseio.com",
  projectId: "sweetshadow-237de",
  storageBucket: "sweetshadow-237de.firebasestorage.app",
  messagingSenderId: "903858609597",
  appId: "1:903858609597:web:c8df2e004da03908d606d4"
};
const DEFAULT_INVENTORY = [
  {name:'Ballpen (Black)',    category:'Writing', unit:'piece', qty:120, low:20},
  {name:'Ballpen (Blue)',     category:'Writing', unit:'piece', qty:80,  low:20},
  {name:'Pencil (HB)',        category:'Writing', unit:'piece', qty:60,  low:15},
  {name:'Sticky Notes (3x3)',category:'Paper',   unit:'pack',  qty:25,  low:5},
  {name:'Bond Paper (A4)',    category:'Paper',   unit:'ream',  qty:18,  low:3},
  {name:'Folder (Long)',      category:'Filing',  unit:'piece', qty:45,  low:10},
  {name:'Stapler',            category:'Desktop', unit:'piece', qty:8,   low:2},
  {name:'Staple Wire',        category:'Desktop', unit:'box',   qty:30,  low:5},
  {name:'Scotch Tape',        category:'Desktop', unit:'roll',  qty:15,  low:3},
  {name:'Correction Tape',    category:'Writing', unit:'piece', qty:22,  low:5},
  {name:'Scissors',           category:'Desktop', unit:'piece', qty:6,   low:2},
  {name:'Envelopes (Long)',   category:'Paper',   unit:'pack',  qty:12,  low:3},
];
const DEFAULT_INVENTORY = [
  {name:'Ballpen (Black)',    category:'Writing', unit:'piece', qty:120, low:20},
  {name:'Ballpen (Blue)',     category:'Writing', unit:'piece', qty:80,  low:20},
  {name:'Pencil (HB)',        category:'Writing', unit:'piece', qty:60,  low:15},
  {name:'Sticky Notes (3x3)',category:'Paper',   unit:'pack',  qty:25,  low:5},
  {name:'Bond Paper (A4)',    category:'Paper',   unit:'ream',  qty:18,  low:3},
  {name:'Folder (Long)',      category:'Filing',  unit:'piece', qty:45,  low:10},
  {name:'Stapler',            category:'Desktop', unit:'piece', qty:8,   low:2},
  {name:'Staple Wire',        category:'Desktop', unit:'box',   qty:30,  low:5},
  {name:'Scotch Tape',        category:'Desktop', unit:'roll',  qty:15,  low:3},
  {name:'Correction Tape',    category:'Writing', unit:'piece', qty:22,  low:5},
  {name:'Scissors',           category:'Desktop', unit:'piece', qty:6,   low:2},
  {name:'Envelopes (Long)',   category:'Paper',   unit:'pack',  qty:12,  low:3},
];
let db = null;
let state = {
  screen:'loading', currentUser:null, tab:'inventory',
  inventory:[], logs:[],
  loginUser:'', loginPass:'', loginError:'', loginLoading:false,
  alert:null, showAddItem:false, showEditItem:null,
  newItem:{name:'',category:'',unit:'',qty:'',low:'5'},
  requestQty:{}, restockQty:{},
  searchTerm:'', filterCat:'',
  configInput:{apiKey:'',authDomain:'',projectId:'',storageBucket:'',messagingSenderId:'',appId:''},
  configError:'',
};

function initFirebase(config) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.firestore(); return true;
  } catch(e) { console.error(e); return false; }
}
async function seedDatabase() {
  const usersSnap = await db.collection('users').get();
  if (usersSnap.empty) {
    const batch = db.batch();
    DEFAULT_USERS.forEach(u => {
      batch.set(db.collection('users').doc(u.username.toLowerCase()), {...u, username:u.username.toLowerCase()});
    });
    await batch.commit();
  }
  const invSnap = await db.collection('inventory').get();
  if (invSnap.empty) {
    const batch = db.batch();
    DEFAULT_INVENTORY.forEach(item => {
      batch.set(db.collection('inventory').doc(), {...item, createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    });
    await batch.commit();
  }
}
function subscribeInventory() {
  db.collection('inventory').orderBy('name').onSnapshot(snap => {
    state.inventory = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (state.screen==='app') render();
  });
}
function subscribeLogs() {
  db.collection('logs').orderBy('createdAt','desc').limit(200).onSnapshot(snap => {
    state.logs = snap.docs.map(d => ({id:d.id,...d.data()}));
    if (state.screen==='app') render();
  });
}
function showAlert(msg, type='success') {
  state.alert = {msg, type}; render();
  setTimeout(() => { state.alert=null; render(); }, 3500);
}
async function doLogin() {
  if (!state.loginUser || !state.loginPass) return;
  state.loginLoading = true; render();
  try {
    const doc = await db.collection('users').doc(state.loginUser.trim().toLowerCase()).get();
    if (doc.exists && doc.data().password === state.loginPass) {
      state.currentUser = {id:doc.id,...doc.data()};
      state.loginError = ''; state.loginUser = ''; state.loginPass = '';
      state.screen = 'app'; subscribeInventory(); subscribeLogs();
    } else { state.loginError = 'Invalid username or password.'; }
  } catch(e) { state.loginError = 'Connection error. Please try again.'; console.error(e); }
  state.loginLoading = false; render();
}
function doLogout() {
  state.currentUser=null; state.screen='login'; state.tab='inventory';
  state.inventory=[]; state.logs=[]; render();
}
async function requestItem(itemId) {
  const qty = parseInt(state.requestQty[itemId]||0);
  const item = state.inventory.find(i=>i.id===itemId);
  if (!item) return;
  if (!qty||qty<1) { showAlert('Enter a valid quantity.','error'); return; }
  if (qty>item.qty) { showAlert('Only '+item.qty+' '+item.unit+'(s) available.','error'); return; }
  try {
    await db.collection('inventory').doc(itemId).update({qty:item.qty-qty});
    await db.collection('logs').add({itemId,itemName:item.name,qty,unit:item.unit,user:state.currentUser.name,username:state.currentUser.username,type:'taken',createdAt:firebase.firestore.FieldValue.serverTimestamp(),dateStr:new Date().toLocaleString('en-PH')});
    state.requestQty[itemId]='';
    showAlert(qty+' '+item.unit+'(s) of "'+item.name+'" logged.');
  } catch(e) { showAlert('Error saving request.','error'); console.error(e); }
}
async function restockItem(itemId) {
  const qty = parseInt(state.restockQty[itemId]||0);
  const item = state.inventory.find(i=>i.id===itemId);
  if (!item) return;
  if (!qty||qty<1) { showAlert('Enter a valid quantity.','error'); return; }
  try {
    await db.collection('inventory').doc(itemId).update({qty:item.qty+qty});
    await db.collection('logs').add({itemId,itemName:item.name,qty,unit:item.unit,user:state.currentUser.name,username:state.currentUser.username,type:'restock',createdAt:firebase.firestore.FieldValue.serverTimestamp(),dateStr:new Date().toLocaleString('en-PH')});
    state.restockQty[itemId]='';
    showAlert('Restocked '+qty+' '+item.unit+'(s) of "'+item.name+'".');
  } catch(e) { showAlert('Error restocking.','error'); console.error(e); }
}
async function addItem() {
  const n = state.newItem;
  if (!n.name||!n.category||!n.unit||n.qty==='') { showAlert('Fill in all required fields.','error'); return; }
  try {
    await db.collection('inventory').add({name:n.name.trim(),category:n.category,unit:n.unit.trim(),qty:parseInt(n.qty),low:parseInt(n.low)||5,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    state.newItem={name:'',category:'',unit:'',qty:'',low:'5'}; state.showAddItem=false;
    showAlert('"'+n.name+'" added to inventory.');
  } catch(e) { showAlert('Error adding item.','error'); console.error(e); }
}
async function saveEditItem() {
  const e = state.showEditItem; if (!e) return;
  try {
    await db.collection('inventory').doc(e.id).update({name:e.name,category:e.category,unit:e.unit,qty:parseInt(e.qty),low:parseInt(e.low)});
    state.showEditItem=null; showAlert('Item updated.');
  } catch(err) { showAlert('Error updating.','error'); console.error(err); }
}
async function deleteItem(id, name) {
  if (!confirm('Remove "'+name+'" from inventory?')) return;
  try { await db.collection('inventory').doc(id).delete(); showAlert('"'+name+'" removed.'); }
  catch(e) { showAlert('Error deleting.','error'); console.error(e); }
}
function editItem(id) {
  const item = state.inventory.find(i=>i.id===id); if (!item) return;
  state.showEditItem={...item}; state.showAddItem=false; render();
}
function getInitials(name) { return name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function getStatus(item) { if(item.qty===0) return 'out'; if(item.qty<=item.low) return 'low'; return 'ok'; }
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function renderSetup() {
  const c = state.configInput;
  return `<div style="min-height:100vh;background:var(--bg);padding:24px 16px">
    <div style="max-width:640px;margin:0 auto">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:28px">
        <div class="logo-icon">📦</div>
        <div><div class="logo-text">OCM <span>Inventory</span></div><div class="logo-sub">First-time Setup</div></div>
      </div>
      <div class="setup-panel">
        <h3>⚙ Firebase Setup Required</h3>
        <div class="setup-steps">
          <div class="setup-step"><strong>Step 1</strong>Go to <a href="https://console.firebase.google.com" target="_blank" style="color:var(--accent)">console.firebase.google.com</a> → Add project.</div>
          <div class="setup-step"><strong>Step 2</strong>Build → Firestore Database → Create database → Start in test mode.</div>
          <div class="setup-step"><strong>Step 3</strong>Project Settings → Your apps → Web → copy firebaseConfig values.</div>
          <div class="setup-step"><strong>Step 4</strong>Paste below and click Save.</div>
        </div>
      </div>
      <div class="card">
        <h2 style="margin-bottom:16px">Firebase Configuration</h2>
        ${state.configError?'<div class="alert alert-error">'+state.configError+'</div>':''}
        <div class="form-grid" style="margin-top:16px">
          <div class="form-group"><label>API Key</label><input placeholder="AIzaSy..." value="${esc(c.apiKey)}" oninput="state.configInput.apiKey=this.value"/></div>
          <div class="form-group"><label>Auth Domain</label><input placeholder="app.firebaseapp.com" value="${esc(c.authDomain)}" oninput="state.configInput.authDomain=this.value"/></div>
          <div class="form-group"><label>Project ID</label><input placeholder="your-app-id" value="${esc(c.projectId)}" oninput="state.configInput.projectId=this.value"/></div>
          <div class="form-group"><label>Storage Bucket</label><input placeholder="app.appspot.com" value="${esc(c.storageBucket)}" oninput="state.configInput.storageBucket=this.value"/></div>
          <div class="form-group"><label>Messaging Sender ID</label><input placeholder="123456789" value="${esc(c.messagingSenderId)}" oninput="state.configInput.messagingSenderId=this.value"/></div>
          <div class="form-group"><label>App ID</label><input placeholder="1:123:web:abc" value="${esc(c.appId)}" oninput="state.configInput.appId=this.value"/></div>
        </div>
        <button class="btn-primary" style="width:100%;padding:12px;margin-top:4px" onclick="saveConfig()">Save &amp; Connect</button>
      </div>
    </div>
  </div>`;
}
function saveConfig() {
  const c = state.configInput;
  if (!c.apiKey||!c.projectId) { state.configError='API Key and Project ID are required.'; render(); return; }
  localStorage.setItem('inv_firebase_config', JSON.stringify(c)); location.reload();
}

function renderLogin() {
  return `<div class="login-bg">
    <div class="login-card">
      <div class="login-logo-wrap">📦</div>
      <div class="login-title">OCM Inventory</div>
      <div class="login-sub">Office Supplies Management System</div>
      <div class="login-divider"></div>
      ${state.loginError?'<div class="alert alert-error" style="margin-bottom:16px">'+state.loginError+'</div>':''}
      <div style="display:flex;flex-direction:column;gap:14px">
        <div class="form-group">
          <label>Username</label>
          <input type="text" value="${esc(state.loginUser)}" oninput="state.loginUser=this.value" placeholder="Enter your username" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" value="${esc(state.loginPass)}" oninput="state.loginPass=this.value" placeholder="Enter your password" onkeydown="if(event.key==='Enter')doLogin()"/>
        </div>
        <button class="login-btn" onclick="doLogin()" ${state.loginLoading?'disabled':''}>
          ${state.loginLoading?'<span class="spinner" style="width:15px;height:15px;border-width:2px;border-top-color:#fff;vertical-align:middle"></span>':'Sign In'}
        </button>
      </div>
    </div>
  </div>`;
}

function renderTopbar() {
  const u = state.currentUser;
  return `<div class="topbar">
    <div class="logo-wrap">
      <div class="logo-icon">📦</div>
      <div><div class="logo-text">OCM <span>Inventory</span></div><div class="logo-sub">Office Supplies</div></div>
    </div>
    <div class="user-chip">
      <div class="avatar">${getInitials(u.name)}</div>
      <span class="user-name" style="font-size:13px;font-weight:500">${esc(u.name)}</span>
      <span class="badge ${u.role==='admin'?'badge-admin':'badge-staff'}">${u.role}</span>
      <button class="btn-ghost btn-sm" onclick="doLogout()" style="font-size:12px;color:var(--text3)">Sign out</button>
    </div>
  </div>`;
}
function renderTabs() {
  const tabs = state.currentUser.role==='admin'
    ? [['inventory','📋  Inventory'],['logs','📜  Activity Log'],['admin','⚙  Manage']]
    : [['inventory','📋  Inventory'],['logs','📜  My Requests']];
  return `<div class="tabs-bar">${tabs.map(([k,v])=>`<button class="tab-btn ${state.tab===k?'active':''}" onclick="state.tab='${k}';render()">${v}</button>`).join('')}</div>`;
}
function renderAlert() { return state.alert?`<div class="alert alert-${state.alert.type}">${state.alert.msg}</div>`:''; }
function renderStats() {
  const inv=state.inventory, out=inv.filter(i=>getStatus(i)==='out').length, low=inv.filter(i=>getStatus(i)==='low').length, ok=inv.filter(i=>getStatus(i)==='ok').length;
  return `<div class="stats-grid">
    <div class="stat-card" style="--al:var(--accent)"><div class="stat-val">${inv.length}</div><div class="stat-lbl">Total Items</div></div>
    <div class="stat-card" style="--al:var(--green)"><div class="stat-val" style="color:var(--green)">${ok}</div><div class="stat-lbl" style="color:var(--green-text)">In Stock</div></div>
    <div class="stat-card" style="--al:var(--amber)"><div class="stat-val" style="color:var(--amber)">${low}</div><div class="stat-lbl" style="color:var(--amber-text)">Low Stock</div></div>
    <div class="stat-card" style="--al:var(--red)"><div class="stat-val" style="color:var(--red)">${out}</div><div class="stat-lbl" style="color:var(--red-text)">Out of Stock</div></div>
  </div>`;
}
function renderInventoryTab() {
  const isStaff=state.currentUser.role==='staff';
  const cats=[...new Set(state.inventory.map(i=>i.category))].sort();
  let items=state.inventory;
  if (state.searchTerm) items=items.filter(i=>i.name.toLowerCase().includes(state.searchTerm.toLowerCase()));
  if (state.filterCat) items=items.filter(i=>i.category===state.filterCat);
  return `<div class="content">
    ${renderAlert()}${renderStats()}
    <div class="toolbar">
      <input placeholder="Search supplies..." value="${esc(state.searchTerm)}" oninput="state.searchTerm=this.value;render()" style="flex:1;min-width:140px;max-width:240px"/>
      <select onchange="state.filterCat=this.value;render()" style="max-width:160px">
        <option value="">All categories</option>
        ${cats.map(c=>`<option value="${esc(c)}" ${state.filterCat===c?'selected':''}>${esc(c)}</option>`).join('')}
      </select>
    </div>
    <div class="card-flush"><table>
      <thead><tr>
        <th>Item</th><th>Category</th><th>In Stock</th><th>Status</th>
        ${isStaff?'<th>Request Qty</th><th></th>':'<th>Restock</th>'}
      </tr></thead>
      <tbody>
        ${items.length===0?`<tr><td colspan="6"><div class="empty-state"><div class="icon">🔍</div><p>No items found</p></div></td></tr>`:''}
        ${items.map(item=>{
          const s=getStatus(item), badge=s==='ok'?'badge-ok':s==='low'?'badge-low':'badge-out', label=s==='ok'?'In Stock':s==='low'?'Low Stock':'Out of Stock';
          return `<tr>
            <td style="font-weight:600">${esc(item.name)}</td>
            <td><span class="cat-pill">${esc(item.category)}</span></td>
            <td><span style="font-family:var(--mono);font-weight:600;font-size:15px">${item.qty}</span> <span style="color:var(--text3);font-size:11px">${esc(item.unit)}s</span></td>
            <td><span class="badge ${badge}">${label}</span></td>
            ${isStaff?`
              <td><div class="qty-input-wrap"><input type="number" min="1" max="${item.qty}" value="${esc(state.requestQty[item.id]||'')}" oninput="state.requestQty['${item.id}']=this.value" placeholder="qty" ${item.qty===0?'disabled':''} style="width:72px"/></div></td>
              <td><button class="btn-primary btn-sm" onclick="requestItem('${item.id}')" ${item.qty===0?'disabled':''}>Get</button></td>
            `:`
              <td><div class="qty-input-wrap">
                <input type="number" min="1" value="${esc(state.restockQty[item.id]||'')}" oninput="state.restockQty['${item.id}']=this.value" placeholder="qty" style="width:72px"/>
                <button class="btn-sm" style="background:var(--green-bg);border-color:rgba(52,211,153,0.25);color:var(--green);white-space:nowrap" onclick="restockItem('${item.id}')">+ Add</button>
              </div></td>
            `}
          </tr>`;
        }).join('')}
      </tbody>
    </table></div>
  </div>`;
}
function renderLogsTab() {
  const isStaff=state.currentUser.role==='staff';
  const logs=isStaff?state.logs.filter(l=>l.username===state.currentUser.username):state.logs;
  return `<div class="content">
    ${renderAlert()}
    <div class="section-header">
      <h2>${isStaff?'My Request History':'All Activity Log'}</h2>
      <span style="font-size:11px;color:var(--text3);font-family:var(--mono)">${logs.length} records</span>
    </div>
    <div class="card-flush"><table>
      <thead><tr>${!isStaff?'<th>Staff</th>':''}<th>Item</th><th>Qty</th><th>Type</th><th>Date &amp; Time</th></tr></thead>
      <tbody>
        ${logs.length===0?`<tr><td colspan="5"><div class="empty-state"><div class="icon">📋</div><p>No activity yet</p></div></td></tr>`:''}
        ${logs.map(l=>`<tr>
          ${!isStaff?`<td style="font-weight:600">${esc(l.user)}</td>`:''}
          <td>${esc(l.itemName)}</td>
          <td><span style="font-family:var(--mono);font-weight:600">${l.qty}</span> <span style="color:var(--text3);font-size:11px">${esc(l.unit)}s</span></td>
          <td><span class="badge ${l.type==='restock'?'badge-restock':'badge-taken'}">${l.type==='restock'?'Restock':'Taken'}</span></td>
          <td style="color:var(--text3);font-size:12px;font-family:var(--mono)">${esc(l.dateStr||'')}</td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}
function renderAdminTab() {
  const n=state.newItem, e=state.showEditItem, cats=['Writing','Paper','Filing','Desktop','Other'];
  return `<div class="content">
    ${renderAlert()}
    <div class="section-header">
      <h2>Manage Supply Items</h2>
      <button class="btn-primary btn-sm" onclick="state.showAddItem=!state.showAddItem;state.showEditItem=null;render()">+ Add Item</button>
    </div>
    ${state.showAddItem?`
    <div class="card edit-card" style="margin-bottom:18px">
      <h3 style="margin-bottom:14px;color:var(--accent)">New Supply Item</h3>
      <div class="form-grid">
        <div class="form-group"><label>Item Name *</label><input placeholder="e.g. Highlighter Yellow" value="${esc(n.name)}" oninput="state.newItem.name=this.value"/></div>
        <div class="form-group"><label>Category *</label><select onchange="state.newItem.category=this.value"><option value="">Select...</option>${cats.map(c=>`<option ${n.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="form-group"><label>Unit *</label><input placeholder="piece / pack / box" value="${esc(n.unit)}" oninput="state.newItem.unit=this.value"/></div>
        <div class="form-group"><label>Initial Qty *</label><input type="number" min="0" placeholder="0" value="${esc(n.qty)}" oninput="state.newItem.qty=this.value"/></div>
        <div class="form-group"><label>Low Stock Alert</label><input type="number" min="1" placeholder="5" value="${esc(n.low)}" oninput="state.newItem.low=this.value"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary btn-sm" onclick="addItem()">Save Item</button>
        <button class="btn-sm" onclick="state.showAddItem=false;render()">Cancel</button>
      </div>
    </div>`:''}
    ${e?`
    <div class="card edit-card" style="margin-bottom:18px">
      <h3 style="margin-bottom:14px;color:var(--accent)">Edit: ${esc(e.name)}</h3>
      <div class="form-grid">
        <div class="form-group"><label>Item Name</label><input value="${esc(e.name)}" oninput="state.showEditItem.name=this.value"/></div>
        <div class="form-group"><label>Category</label><select onchange="state.showEditItem.category=this.value">${cats.map(c=>`<option ${e.category===c?'selected':''}>${c}</option>`).join('')}</select></div>
        <div class="form-group"><label>Unit</label><input value="${esc(e.unit)}" oninput="state.showEditItem.unit=this.value"/></div>
        <div class="form-group"><label>Current Qty</label><input type="number" min="0" value="${esc(e.qty)}" oninput="state.showEditItem.qty=this.value"/></div>
        <div class="form-group"><label>Low Stock Alert</label><input type="number" min="1" value="${esc(e.low)}" oninput="state.showEditItem.low=this.value"/></div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn-primary btn-sm" onclick="saveEditItem()">Save Changes</button>
        <button class="btn-sm" onclick="state.showEditItem=null;render()">Cancel</button>
      </div>
    </div>`:''}
    <div class="card-flush"><table>
      <thead><tr><th>Item</th><th>Category</th><th>Unit</th><th>Qty</th><th>Low Alert</th><th>Actions</th></tr></thead>
      <tbody>
        ${state.inventory.map(item=>`<tr>
          <td style="font-weight:600">${esc(item.name)}</td>
          <td><span class="cat-pill">${esc(item.category)}</span></td>
          <td style="color:var(--text2)">${esc(item.unit)}</td>
          <td style="font-family:var(--mono);font-weight:600">${item.qty}</td>
          <td style="font-family:var(--mono);color:var(--text3)">${item.low}</td>
          <td><div style="display:flex;gap:6px">
            <button class="btn-sm" onclick="editItem('${item.id}')">Edit</button>
            <button class="btn-danger btn-sm" onclick="deleteItem('${item.id}','${esc(item.name).replace(/'/g,'&#39;')}')">Delete</button>
          </div></td>
        </tr>`).join('')}
      </tbody>
    </table></div>
  </div>`;
}
function renderApp() {
  let content='';
  if (state.tab==='inventory') content=renderInventoryTab();
  else if (state.tab==='logs') content=renderLogsTab();
  else if (state.tab==='admin'&&state.currentUser.role==='admin') content=renderAdminTab();
  return renderTopbar()+renderTabs()+content;
}
function render() {
  const app=document.getElementById('app');
  if (state.screen==='loading') app.innerHTML=`<div class="loading-screen"><div class="spinner"></div><span style="font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:4px">INITIALIZING SYSTEM</span></div>`;
  else if (state.screen==='setup') app.innerHTML=renderSetup();
  else if (state.screen==='login') app.innerHTML=renderLogin();
  else if (state.screen==='app') app.innerHTML=renderApp();
}
async function start() {
  render();
  let config=FIREBASE_CONFIG;
  const saved=localStorage.getItem('inv_firebase_config');
  if (saved) { try { config=JSON.parse(saved); } catch(e) {} }
  if (!config.apiKey||!config.projectId) { state.screen='setup'; render(); return; }
  if (!initFirebase(config)) { state.screen='setup'; render(); return; }
  try {
    await seedDatabase(); state.screen='login'; render();
  } catch(e) {
    console.error(e); state.screen='setup';
    state.configError='Could not connect to Firebase. Check your config and make sure Firestore is enabled in test mode.';
    render();
  }
}
start();
</script>
</body>
</html>
