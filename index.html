<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OCM Inventory</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}

/* ── DARK THEME (default) ── */
:root,[data-theme="dark"]{
  --bg:#0F1117;--bg2:#161B27;--bg3:#1E2535;
  --surface:#1A2030;--surface2:#222A3A;--surface3:#2A3347;
  --accent:#4F8EF7;--accent2:#3B7AE8;
  --accent-glow:rgba(79,142,247,0.18);
  --green:#34D399;--green-bg:rgba(52,211,153,0.12);--green-text:#34D399;
  --amber:#FBBF24;--amber-bg:rgba(251,191,36,0.12);--amber-text:#FBBF24;
  --red:#F87171;--red-bg:rgba(248,113,113,0.12);--red-text:#F87171;
  --teal:#2DD4BF;--teal-bg:rgba(45,212,191,0.12);--teal-text:#2DD4BF;
  --text:#E8EDF5;--text2:#8B96AA;--text3:#4E5A6E;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.1);
  --shadow:0 4px 32px rgba(0,0,0,0.5);
  --tr-hover:rgba(255,255,255,0.02);
  --scrollbar-thumb:#2A3347;
}

/* ── LIGHT THEME ── */
[data-theme="light"]{
  --bg:#F4F5F7;--bg2:#FFFFFF;--bg3:#F0F2F5;
  --surface:#FFFFFF;--surface2:#F4F5F7;--surface3:#E8EBF0;
  --accent:#3B7AE8;--accent2:#2563D4;
  --accent-glow:rgba(59,122,232,0.12);
  --green:#16A34A;--green-bg:rgba(22,163,74,0.10);--green-text:#15803D;
  --amber:#D97706;--amber-bg:rgba(217,119,6,0.10);--amber-text:#B45309;
  --red:#DC2626;--red-bg:rgba(220,38,38,0.10);--red-text:#B91C1C;
  --teal:#0D9488;--teal-bg:rgba(13,148,136,0.10);--teal-text:#0F766E;
  --text:#111827;--text2:#4B5563;--text3:#9CA3AF;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);
  --shadow:0 4px 24px rgba(0,0,0,0.10);
  --tr-hover:rgba(0,0,0,0.02);
  --scrollbar-thumb:#CBD5E1;
}

:root{
  --radius:10px;--radius-lg:14px;--radius-xl:20px;
  --font:'Sora',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;line-height:1.5;transition:background .25s,color .25s}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--scrollbar-thumb);border-radius:3px}
h2{font-size:16px;font-weight:600;letter-spacing:-.2px}
h3{font-size:14px;font-weight:500}
input,select{font-family:var(--font);font-size:13px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:9px 13px;color:var(--text);width:100%;outline:none;transition:border-color .2s,box-shadow .2s,background .25s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
input::placeholder{color:var(--text3)}
select option{background:var(--bg3);color:var(--text)}
button{font-family:var(--font);font-size:13px;cursor:pointer;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface2);color:var(--text);padding:8px 16px;transition:all .18s;font-weight:500}
button:hover{background:var(--surface3)}
button:active{transform:scale(.98)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(59,122,232,0.28)}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
.btn-danger{background:var(--red-bg);border-color:rgba(220,38,38,0.25);color:var(--red)}
.btn-danger:hover{background:rgba(220,38,38,0.18)}
.btn-success{background:var(--green-bg);border-color:rgba(22,163,74,0.25);color:var(--green)}
.btn-success:hover{background:rgba(22,163,74,0.18)}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-ghost{border-color:transparent;background:transparent;color:var(--text2)}
.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;transition:background .25s,border-color .25s}
.card-flush{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:background .25s}
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.03em}
.badge-ok{background:var(--green-bg);color:var(--green-text)}
.badge-low{background:var(--amber-bg);color:var(--amber-text)}
.badge-out{background:var(--red-bg);color:var(--red-text)}
.badge-admin{background:var(--accent-glow);color:var(--accent)}
.badge-staff{background:var(--teal-bg);color:var(--teal-text)}
.badge-restock{background:var(--green-bg);color:var(--green-text)}
.badge-taken{background:var(--amber-bg);color:var(--amber-text)}
label{font-size:11px;font-weight:600;color:var(--text3);display:block;margin-bottom:5px;letter-spacing:.07em;text-transform:uppercase}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 16px;color:var(--text3);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--border);background:var(--bg2);white-space:nowrap;transition:background .25s}
td{padding:11px 16px;border-bottom:1px solid var(--border);transition:background .25s}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--tr-hover)}
.table-wrap{overflow-y:auto;max-height:460px;border-radius:var(--radius-lg);border:1px solid var(--border)}
.table-wrap th{position:sticky;top:0;z-index:2;background:var(--bg2)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;transition:background .25s,border-color .25s}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#3B7AE8,#4F8EF7);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 2px 10px rgba(79,142,247,0.3)}
.logo-text{font-size:15px;font-weight:700;letter-spacing:-.4px}
.logo-text span{color:var(--accent)}
.logo-sub{font-size:9px;color:var(--text3);letter-spacing:.1em;margin-top:1px;text-transform:uppercase}
.user-chip{display:flex;align-items:center;gap:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.tabs-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:2px;transition:background .25s}
.tab-btn{padding:12px 18px;border:none;background:transparent;color:var(--text3);font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;font-family:var(--font)}
.tab-btn:hover{color:var(--text2);background:transparent}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden;cursor:pointer;transition:border-color .18s,box-shadow .18s,background .25s}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--al,var(--accent))}
.stat-card:hover{border-color:var(--border2)}
.stat-card.af{border-color:var(--al,var(--accent)) !important;box-shadow:0 0 0 1px var(--al,var(--accent))}
.stat-val{font-size:28px;font-weight:700;line-height:1;font-family:var(--mono);letter-spacing:-.5px}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:5px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
.toolbar-frozen{margin-bottom:12px}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.alert{padding:11px 15px;border-radius:var(--radius);font-size:13px;margin-bottom:16px;font-weight:500;display:flex;align-items:center;gap:8px;border:1px solid transparent}
.alert-success{background:var(--green-bg);color:var(--green-text);border-color:rgba(22,163,74,0.2)}
.alert-error{background:var(--red-bg);color:var(--red-text);border-color:rgba(220,38,38,0.2)}
.alert-info{background:var(--accent-glow);color:var(--accent)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-group{display:flex;flex-direction:column}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.section-header-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.empty-state{text-align:center;padding:56px 20px;color:var(--text3)}
.empty-state .icon{font-size:32px;margin-bottom:10px;opacity:.4}
.empty-state p{font-size:13px}
.spinner{display:inline-block;width:18px;height:18px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.qty-input-wrap{display:flex;gap:6px;align-items:center}
.qty-input-wrap input{width:72px}
.cat-pill{font-size:11px;background:var(--surface3);color:var(--text2);padding:2px 9px;border-radius:20px}
.sf-wrap{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.sf{padding:4px 14px;font-size:12px;font-weight:600;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);color:var(--text3);cursor:pointer;transition:all .15s;font-family:var(--font)}
.sf:hover{color:var(--text2)}
.sf.sa{border-color:rgba(79,142,247,0.4);background:var(--accent-glow);color:var(--accent)}
.sf.so{border-color:rgba(22,163,74,0.35);background:var(--green-bg);color:var(--green)}
.sf.sl{border-color:rgba(217,119,6,0.35);background:var(--amber-bg);color:var(--amber)}
.sf.sx{border-color:rgba(220,38,38,0.35);background:var(--red-bg);color:var(--red)}
.pager{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-top:1px solid var(--border);background:var(--surface);border-radius:0 0 var(--radius-lg) var(--radius-lg)}
.pager-info{font-size:12px;color:var(--text3);font-family:var(--mono)}
.pager-btns{display:flex;gap:6px}
.pb{padding:4px 12px;font-size:12px;border-radius:8px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:var(--font);transition:all .15s}
.pb:hover:not([disabled]){background:var(--surface3);color:var(--text)}
.pb[disabled]{opacity:.3;cursor:not-allowed}
.pb.cur{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── THEME TOGGLE ── */
.theme-toggle{display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--surface2);cursor:pointer;font-size:12px;font-weight:600;color:var(--text2);transition:all .18s;font-family:var(--font)}
.theme-toggle:hover{background:var(--surface3);color:var(--text)}
.theme-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0}

/* ── SETTINGS TAB ── */
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:16px}
.settings-card h3{font-size:14px;font-weight:600;margin-bottom:16px;color:var(--text)}
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.theme-option{border:2px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s;text-align:center;background:var(--surface2)}
.theme-option:hover{border-color:var(--accent)}
.theme-option.selected{border-color:var(--accent);background:var(--accent-glow)}
.theme-option .t-preview{height:60px;border-radius:8px;margin-bottom:10px;display:flex;align-items:center;justify-content:center;font-size:22px}
.t-dark{background:linear-gradient(135deg,#0F1117,#161B27)}
.t-light{background:linear-gradient(135deg,#F4F5F7,#FFFFFF);border:1px solid rgba(0,0,0,0.08)}
.theme-option .t-name{font-size:13px;font-weight:600;color:var(--text)}
.theme-option .t-desc{font-size:11px;color:var(--text3);margin-top:3px}
.theme-option.selected .t-check{display:inline-flex}
.t-check{display:none;width:18px;height:18px;border-radius:50%;background:var(--accent);align-items:center;justify-content:center;font-size:10px;color:#fff;margin:6px auto 0}

/* ── LOGIN ── */
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:var(--bg);background-image:radial-gradient(ellipse at 25% 60%,rgba(79,142,247,0.07) 0%,transparent 55%),radial-gradient(ellipse at 75% 20%,rgba(167,139,250,0.05) 0%,transparent 50%)}
.login-card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);padding:2.5rem 2rem;box-shadow:var(--shadow);animation:fadeUp .38s cubic-bezier(.22,1,.36,1)}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.login-logo-wrap{width:60px;height:60px;background:linear-gradient(135deg,#3B7AE8,#6366F1);border-radius:18px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;font-size:28px;box-shadow:0 8px 28px rgba(79,142,247,0.35)}
.login-title{font-size:22px;font-weight:700;letter-spacing:-.5px;text-align:center;color:var(--text)}
.login-sub{font-size:12px;color:var(--text3);text-align:center;margin-top:6px;letter-spacing:.04em}
.login-divider{height:1px;background:var(--border);margin:1.75rem 0}
.login-btn{width:100%;padding:12px;font-size:14px;font-weight:600;background:var(--accent);border-color:var(--accent);color:#fff;border-radius:var(--radius);margin-top:6px;box-shadow:0 4px 18px rgba(79,142,247,0.35);transition:all .2s}
.login-btn:hover{background:var(--accent2);box-shadow:0 6px 26px rgba(79,142,247,0.45);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0)}
.login-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

/* ── SETUP ── */
.setup-panel{background:var(--amber-bg);border:1px solid rgba(217,119,6,0.25);border-radius:var(--radius-lg);padding:20px;margin-bottom:20px}
.setup-panel h3{color:var(--amber);margin-bottom:8px}
.setup-steps{margin-top:12px;display:flex;flex-direction:column;gap:8px}
.setup-step{background:var(--surface2);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--text2)}
.setup-step strong{display:block;font-size:10px;margin-bottom:2px;color:var(--amber);text-transform:uppercase;letter-spacing:.06em}
.edit-card{border:1px solid rgba(79,142,247,0.22)!important;background:var(--accent-glow)!important}
.users-wrap{overflow-y:auto;max-height:320px;border-radius:var(--radius-lg);border:1px solid var(--border)}
.users-wrap th{position:sticky;top:0;z-index:2;background:var(--bg2)}

/* ── DIVIDER ── */
.hdivider{height:1px;background:var(--border);margin:24px 0}

@media(max-width:600px){
  .form-grid{grid-template-columns:1fr}
  .theme-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:10px 14px}
  .content{padding:14px}
  .tabs-bar{padding:0 14px;overflow-x:auto}
  .user-chip .user-name{display:none}
  .login-card{padding:2rem 1.25rem}
  .section-header{flex-direction:column;align-items:flex-start}
}
</style>
</head>

  </div>
</div>
<script>
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCrb4POFjh32drdjet77ZNg3PvNlY7LZg",
  authDomain: "sweetshadow-237de.firebaseapp.com",
  databaseURL: "https://sweetshadow-237de-default-rtdb.firebaseio.com",
  projectId: "sweetshadow-237de",

  messagingSenderId: "903858609597",
  appId: "1:903858609597:web:c8df2e004da03908d606d4"
};
const DEFAULT_USERS = [
  {username:'admin',    password:'admin123', name:'Admin User',      role:'admin'},
  {username:'jezza',    password:'pass123',  name:'Jezza Pauline',   role:'staff'},
  {username:'cien',     password:'pass123',  name:'Cienamaeee',      role:'staff'},
  {username:'ann-dhie', password:'pass123',  name:'Andrea Mhae',     role:'staff'},
  {username:'thess',    password:'pass123',  name:'Marites',         role:'staff'},
  {username:'ken',      password:'pass123',  name:'Kenny',           role:'staff'},
  {username:'dindo',    password:'pass123',  name:'Dindaur',         role:'staff'},
  {username:'sally',    password:'pass123',  name:'Sally Marie',     role:'staff'},
  {username:'gii',      password:'pass123',  name:'Rangi',           role:'staff'},
  {username:'therese',  password:'pass123',  name:'Therese',         role:'staff'},
  {username:'adin',     password:'pass123',  name:'Aldrin',          role:'staff'},
  {username:'tester',   password:'pass123',  name:'Tester',          role:'staff'},
  {username:'piii',     password:'pass123',  name:'Paul Christian',  role:'staff'},
];
const DEFAULT_INVENTORY = [
  {name:'Ballpen (Black)',    category:'Writing', unit:'piece', qty:120, low:20},
  {name:'Ballpen (Blue)',     category:'Writing', unit:'piece', qty:80,  low:20},
  {name:'Pencil (HB)',        category:'Writing', unit:'piece', qty:60,  low:15},
  {name:'Sticky Notes (3x3)',category:'Paper',   unit:'pack',  qty:25,  low:5},
  {name:'Bond Paper (A4)',    category:'Paper',   unit:'ream',  qty:18,  low:3},
  {name:'Folder (Long)',      category:'Filing',  unit:'piece', qty:45,  low:10},
  {name:'Stapler',            category:'Desktop', unit:'piece', qty:8,   low:2},
  {name:'Staple Wire',        category:'Desktop', unit:'box',   qty:30,  low:5},
  {name:'Scotch Tape',        category:'Desktop', unit:'roll',  qty:15,  low:3},
  {name:'Correction Tape',    category:'Writing', unit:'piece', qty:22,  low:5},
  {name:'Scissors',           category:'Desktop', unit:'piece', qty:6,   low:2},
  {name:'Envelopes (Long)',   category:'Paper',   unit:'pack',  qty:12,  low:3},
];
const PS = 10;
let db = null;

// ── THEME ──────────────────────────────────────────────────────────
let currentTheme = localStorage.getItem('ocm_theme') || 'dark';
function applyTheme(t) {
  currentTheme = t;
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('ocm_theme', t);
}
applyTheme(currentTheme);

function toggleTheme() {
  applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
  render();
}
function setTheme(t) {
  applyTheme(t);
  render();
}

// ── STATE ──────────────────────────────────────────────────────────
let S = {
  screen:'loading', currentUser:null, tab:'inventory',
  inventory:[], logs:[],
  loginUser:'', loginPass:'', loginError:'', loginLoading:false,
  alert:null,
  showAddItem:false, showEditItem:null,
  newItem:{name:'',category:'',unit:'',qty:'',low:'5'},
  requestQty:{}, restockQty:{},
  search:'', filterCat:'', filterSt:'all', page:1,
  aSearch:'', aFilterCat:'', aFilterSt:'all', aPage:1,
  // new user form
  showAddUser:false,
  newUser:{username:'',password:'',name:'',role:'staff'},
  addUserLoading:false, addUserError:'',
  // firebase config
  configInput:{apiKey:'',authDomain:'',projectId:'',storageBucket:'',messagingSenderId:'',appId:''},
  configError:'', syncLoading:false,
  // live users from firestore
  firestoreUsers:[],
};

// ── FIREBASE ───────────────────────────────────────────────────────
function initFB(cfg){
  try{if(!firebase.apps.length)firebase.initializeApp(cfg);db=firebase.firestore();return true;}
  catch(e){console.error(e);return false;}
}
async function seedDB(){
  const us=await db.collection('users').get();
  if(us.empty){const b=db.batch();DEFAULT_USERS.forEach(u=>b.set(db.collection('users').doc(u.username.toLowerCase()),{...u,username:u.username.toLowerCase()}));await b.commit();}
  const iv=await db.collection('inventory').get();
  if(iv.empty){const b=db.batch();DEFAULT_INVENTORY.forEach(i=>b.set(db.collection('inventory').doc(),{...i,createdAt:firebase.firestore.FieldValue.serverTimestamp()}));await b.commit();}
}
async function syncUsers(){
  S.syncLoading=true;render();
  try{
    const b=db.batch();
    DEFAULT_USERS.forEach(u=>b.set(db.collection('users').doc(u.username.toLowerCase()),{...u,username:u.username.toLowerCase()},{merge:true}));
    await b.commit();
    await loadFirestoreUsers();
    alert2('All '+DEFAULT_USERS.length+' users synced to Firestore!');
  }catch(e){alert2('Sync failed: '+e.message,'error');}
  S.syncLoading=false;render();
}
async function loadFirestoreUsers(){
  try{const s=await db.collection('users').get();S.firestoreUsers=s.docs.map(d=>({id:d.id,...d.data()}));}
  catch(e){console.error(e);}
}
async function addUserToFirestore(){
  const u=S.newUser;
  if(!u.username||!u.password||!u.name){S.addUserError='Fill in all fields.';render();return;}
  const uname=u.username.trim().toLowerCase();
  if(!/^[a-z0-9_-]+$/.test(uname)){S.addUserError='Username can only have letters, numbers, - or _.';render();return;}
  S.addUserLoading=true;S.addUserError='';render();
  try{
    const existing=await db.collection('users').doc(uname).get();
    if(existing.exists){S.addUserError='Username already exists.';S.addUserLoading=false;render();return;}
    await db.collection('users').doc(uname).set({username:uname,password:u.password,name:u.name.trim(),role:u.role});
    await loadFirestoreUsers();
    S.newUser={username:'',password:'',name:'',role:'staff'};
    S.showAddUser=false;
    alert2('User "'+uname+'" added successfully!');
  }catch(e){S.addUserError='Error: '+e.message;}
  S.addUserLoading=false;render();
}
async function deleteUser(uid,uname){
  if(!confirm('Remove user "'+uname+'"? They will no longer be able to log in.'))return;
  try{
    await db.collection('users').doc(uid).delete();
    await loadFirestoreUsers();
    alert2('User "'+uname+'" removed.');
  }catch(e){alert2('Error deleting user.','error');}
}

async function doLogin(){

  S.loginLoading=true;render();
  try{

async function requestItem(id){
  const qty=parseInt(S.requestQty[id]||0),item=S.inventory.find(i=>i.id===id);
  if(!item)return;
  if(!qty||qty<1){alert2('Enter a valid quantity.','error');return;}
  if(qty>item.qty){alert2('Only '+item.qty+' '+item.unit+'(s) available.','error');return;}
  try{
    await db.collection('inventory').doc(id).update({qty:item.qty-qty});
    await db.collection('logs').add({itemId:id,itemName:item.name,qty,unit:item.unit,user:S.currentUser.name,username:S.currentUser.username,type:'taken',createdAt:firebase.firestore.FieldValue.serverTimestamp(),dateStr:new Date().toLocaleString('en-PH')});
    S.requestQty[id]='';alert2(qty+' '+item.unit+'(s) of "'+item.name+'" logged.');
  }catch(e){alert2('Error saving request.','error');console.error(e);}
}
async function restockItem(id){
  const qty=parseInt(S.restockQty[id]||0),item=S.inventory.find(i=>i.id===id);
  if(!item)return;
  if(!qty||qty<1){alert2('Enter a valid quantity.','error');return;}
  try{
    await db.collection('inventory').doc(id).update({qty:item.qty+qty});
    await db.collection('logs').add({itemId:id,itemName:item.name,qty,unit:item.unit,user:S.currentUser.name,username:S.currentUser.username,type:'restock',createdAt:firebase.firestore.FieldValue.serverTimestamp(),dateStr:new Date().toLocaleString('en-PH')});
    S.restockQty[id]='';alert2('Restocked '+qty+' '+item.unit+'(s) of "'+item.name+'".');
  }catch(e){alert2('Error restocking.','error');console.error(e);}
}
async function addItem(){
  const n=S.newItem;
  if(!n.name||!n.category||!n.unit||n.qty===''){alert2('Fill in all required fields.','error');return;}
  try{
    await db.collection('inventory').add({name:n.name.trim(),category:n.category,unit:n.unit.trim(),qty:parseInt(n.qty),low:parseInt(n.low)||5,createdAt:firebase.firestore.FieldValue.serverTimestamp()});
    S.newItem={name:'',category:'',unit:'',qty:'',low:'5'};S.showAddItem=false;
    alert2('"'+n.name+'" added to inventory.');
  }catch(e){alert2('Error adding item.','error');console.error(e);}
}
async function saveEdit(){
  const e=S.showEditItem;if(!e)return;
  try{
    await db.collection('inventory').doc(e.id).update({name:e.name,category:e.category,unit:e.unit,qty:parseInt(e.qty),low:parseInt(e.low)});
    S.showEditItem=null;alert2('Item updated.');
  }catch(err){alert2('Error updating.','error');console.error(err);}
}

    '<span class="badge '+(S.currentUser.role==='admin'?'badge-admin':'badge-staff')+'">'+esc(S.currentUser.role)+'</span>'+
    '</div>'+
    '</div>'+
    '<button class="btn-danger btn-sm" onclick="doLogout()" style="margin-top:16px">Sign Out</button>'+
    '</div></div>';
}

// ── ADMIN TAB ─────────────────────────────────────────────────────
function renderAdminTab(){
  const n=S.newItem,e=S.showEditItem,nu=S.newUser,cats=['Writing','Paper','Filing','Desktop','Other'];
  const allCats=[...new Set(S.inventory.map(i=>i.category))].sort();
  let items=S.inventory;
  if(S.aSearch)items=items.filter(i=>i.name.toLowerCase().includes(S.aSearch.toLowerCase()));
  if(S.aFilterCat)items=items.filter(i=>i.category===S.aFilterCat);
  if(S.aFilterSt!=='all')items=items.filter(i=>gs(i)===S.aFilterSt);
  const tot=items.length,tp=Math.max(1,Math.ceil(tot/PS));
  if(S.aPage>tp)S.aPage=tp;
  const pg=items.slice((S.aPage-1)*PS,S.aPage*PS);

  return '<div class="content">'+rAlert()+

    // ── ITEMS SECTION ──
    '<div class="section-header">'+
    '<h2>Manage Supply Items</h2>'+
    '<div class="section-header-actions">'+
    '<button class="btn-success btn-sm" onclick="syncUsers()" '+(S.syncLoading?'disabled':'')+'>'+
    (S.syncLoading?'<span class="spinner" style="width:12px;height:12px;border-width:2px;border-top-color:var(--green);vertical-align:middle;margin-right:4px"></span>':'')+
    '↻ Sync Users</button>'+
    '<button class="btn-primary btn-sm" onclick="S.showAddItem=!S.showAddItem;S.showEditItem=null;render()">+ Add Item</button>'+
    '</div></div>'+

    (S.showAddItem?
    '<div class="card edit-card" style="margin-bottom:18px">'+
    '<h3 style="margin-bottom:14px;color:var(--accent)">New Supply Item</h3>'+
    '<div class="form-grid">'+
    '<div class="form-group"><label>Item Name *</label><input placeholder="e.g. Highlighter Yellow" value="'+esc(n.name)+'" oninput="S.newItem.name=this.value"/></div>'+
    '<div class="form-group"><label>Category *</label><select onchange="S.newItem.category=this.value"><option value="">Select...</option>'+cats.map(c=>'<option '+(n.category===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div>'+
    '<div class="form-group"><label>Unit *</label><input placeholder="piece / pack / box" value="'+esc(n.unit)+'" oninput="S.newItem.unit=this.value"/></div>'+
    '<div class="form-group"><label>Initial Qty *</label><input type="number" min="0" placeholder="0" value="'+esc(n.qty)+'" oninput="S.newItem.qty=this.value"/></div>'+
    '<div class="form-group"><label>Low Stock Alert</label><input type="number" min="1" placeholder="5" value="'+esc(n.low)+'" oninput="S.newItem.low=this.value"/></div>'+
    '</div><div style="display:flex;gap:8px">'+
    '<button class="btn-primary btn-sm" onclick="addItem()">Save Item</button>'+
    '<button class="btn-sm" onclick="S.showAddItem=false;render()">Cancel</button>'+
    '</div></div>':'') +

    (e?
    '<div class="card edit-card" style="margin-bottom:18px">'+
    '<h3 style="margin-bottom:14px;color:var(--accent)">Edit: '+esc(e.name)+'</h3>'+
    '<div class="form-grid">'+
    '<div class="form-group"><label>Item Name</label><input value="'+esc(e.name)+'" oninput="S.showEditItem.name=this.value"/></div>'+
    '<div class="form-group"><label>Category</label><select onchange="S.showEditItem.category=this.value">'+cats.map(c=>'<option '+(e.category===c?'selected':'')+'>'+c+'</option>').join('')+'</select></div>'+
    '<div class="form-group"><label>Unit</label><input value="'+esc(e.unit)+'" oninput="S.showEditItem.unit=this.value"/></div>'+
    '<div class="form-group"><label>Current Qty</label><input type="number" min="0" value="'+esc(e.qty)+'" oninput="S.showEditItem.qty=this.value"/></div>'+
    '<div class="form-group"><label>Low Stock Alert</label><input type="number" min="1" value="'+esc(e.low)+'" oninput="S.showEditItem.low=this.value"/></div>'+
    '</div><div style="display:flex;gap:8px">'+
    '<button class="btn-primary btn-sm" onclick="saveEdit()">Save Changes</button>'+
    '<button class="btn-sm" onclick="S.showEditItem=null;render()">Cancel</button>'+
    '</div></div>':'') +

    // ── Item filters + scrollable table ──
    '<div class="toolbar-frozen">'+
    statsBlock(S.aFilterSt,'setASF')+
    sfBtns(S.aFilterSt,'setASF')+
    '<div class="toolbar">'+
    '<input placeholder="Search items..." value="'+esc(S.aSearch)+'" oninput="S.aSearch=this.value;S.aPage=1;render()" style="flex:1;min-width:140px;max-width:240px"/>'+
    '<select onchange="S.aFilterCat=this.value;S.aPage=1;render()" style="max-width:160px">'+
    '<option value="">All categories</option>'+
    allCats.map(c=>'<option value="'+esc(c)+'" '+(S.aFilterCat===c?'selected':'')+'>'+esc(c)+'</option>').join('')+
    '</select>'+
    '<span style="font-size:12px;color:var(--text3);font-family:var(--mono);white-space:nowrap">'+tot+' item'+(tot!==1?'s':'')+'</span>'+
    '</div></div>'+
    '<div class="table-wrap"><table>'+
    '<thead><tr><th>Item</th><th>Category</th><th>Unit</th><th>Qty</th><th>Low Alert</th><th>Status</th><th>Actions</th></tr></thead>'+
    '<tbody>'+(pg.length===0?'<tr><td colspan="7"><div class="empty-state"><div class="icon">🔍</div><p>No items match</p></div></td></tr>':'')+
    pg.map(item=>{
      const s=gs(item),badge=s==='ok'?'badge-ok':s==='low'?'badge-low':'badge-out',lbl=s==='ok'?'In Stock':s==='low'?'Low Stock':'Out of Stock';
      return '<tr>'+
        '<td style="font-weight:600">'+esc(item.name)+'</td>'+
        '<td><span class="cat-pill">'+esc(item.category)+'</span></td>'+
        '<td style="color:var(--text2)">'+esc(item.unit)+'</td>'+
        '<td style="font-family:var(--mono);font-weight:600">'+item.qty+'</td>'+
        '<td style="font-family:var(--mono);color:var(--text3)">'+item.low+'</td>'+
        '<td><span class="badge '+badge+'">'+lbl+'</span></td>'+
        '<td><div style="display:flex;gap:6px">'+
        '<button class="btn-sm" onclick="editItem(\''+item.id+'\')">Edit</button>'+
        '<button class="btn-danger btn-sm" onclick="delItem(\''+item.id+'\',\''+esc(item.name).replace(/'/g,'&#39;')+'\')">Delete</button>'+
        '</div></td></tr>';
    }).join('')+
    '</tbody></table></div>'+
    pager(S.aPage,tp,'S.aPage--;render()','S.aPage++;render()')+

    // ── USERS SECTION ──
    '<div class="hdivider"></div>'+
    '<div class="section-header">'+
    '<h2>Manage Users</h2>'+
    '<button class="btn-primary btn-sm" onclick="S.showAddUser=!S.showAddUser;S.addUserError=\'\';render()">+ Add User</button>'+
    '</div>'+

    // Add user form
    (S.showAddUser?
    '<div class="card edit-card" style="margin-bottom:18px">'+
    '<h3 style="margin-bottom:14px;color:var(--accent)">New User Account</h3>'+
    (S.addUserError?'<div class="alert alert-error" style="margin-bottom:12px">'+esc(S.addUserError)+'</div>':'')+
    '<div class="form-grid">'+
    '<div class="form-group"><label>Username *</label><input placeholder="e.g. maria" value="'+esc(nu.username)+'" oninput="S.newUser.username=this.value"/><span style="font-size:11px;color:var(--text3);margin-top:4px">Lowercase letters, numbers, - or _ only</span></div>'+
    '<div class="form-group"><label>Full Name *</label><input placeholder="e.g. Maria Santos" value="'+esc(nu.name)+'" oninput="S.newUser.name=this.value"/></div>'+
    '<div class="form-group"><label>Password *</label><input type="text" placeholder="Set a password" value="'+esc(nu.password)+'" oninput="S.newUser.password=this.value"/></div>'+
    '<div class="form-group"><label>Role *</label><select onchange="S.newUser.role=this.value">'+
    '<option value="staff" '+(nu.role==='staff'?'selected':'')+'>Staff</option>'+
    '<option value="admin" '+(nu.role==='admin'?'selected':'')+'>Admin</option>'+
    '</select></div>'+
    '</div>'+
    '<div style="display:flex;gap:8px">'+
    '<button class="btn-primary btn-sm" onclick="addUserToFirestore()" '+(S.addUserLoading?'disabled':'')+'>'+
    (S.addUserLoading?'<span class="spinner" style="width:12px;height:12px;border-width:2px;border-top-color:#fff;vertical-align:middle;margin-right:4px"></span>':'')+
    'Create User</button>'+
    '<button class="btn-sm" onclick="S.showAddUser=false;render()">Cancel</button>'+
    '</div></div>':'') +

    // Users table (live from Firestore)
    '<div class="users-wrap"><table>'+
    '<thead><tr><th>Username</th><th>Name</th><th>Role</th><th>Actions</th></tr></thead>'+
    '<tbody>'+
    (S.firestoreUsers.length===0?
      '<tr><td colspan="4"><div class="empty-state"><div class="icon">👤</div><p>No users loaded — click ↻ Sync Users</p></div></td></tr>'
      :
      S.firestoreUsers.sort((a,b)=>a.username.localeCompare(b.username)).map(u=>'<tr>'+
        '<td style="font-family:var(--mono);font-size:12px;color:var(--accent)">'+esc(u.username)+'</td>'+
        '<td style="font-weight:500">'+esc(u.name||'-')+'</td>'+
        '<td><span class="badge '+(u.role==='admin'?'badge-admin':'badge-staff')+'">'+esc(u.role||'staff')+'</span></td>'+
        '<td>'+
        (u.username!=='admin'?
          '<button class="btn-danger btn-sm" onclick="deleteUser(\''+esc(u.username)+'\',\''+esc(u.username)+'\')">Remove</button>'
          :'<span style="font-size:11px;color:var(--text3)">Protected</span>')+
        '</td>'+
      '</tr>').join('')
    )+
    '</tbody></table></div>'+
    '<p style="font-size:11px;color:var(--text3);margin-top:8px">Click <strong style="color:var(--green)">↻ Sync Users</strong> to reload or push default users if someone cannot log in.</p>'+
    '</div>';
}

// ── APP ───────────────────────────────────────────────────────────
function renderApp(){
  let c='';
  if(S.tab==='inventory')c=renderInvTab();
  else if(S.tab==='logs')c=renderLogsTab();
  else if(S.tab==='admin'&&S.currentUser.role==='admin')c=renderAdminTab();
  else if(S.tab==='settings')c=renderSettingsTab();
  return renderTopbar()+renderTabs()+c;
}

function render(){
  const app=document.getElementById('app');
  if(S.screen==='loading')app.innerHTML='<div class="loading-screen"><div class="spinner"></div><span style="font-size:11px;color:var(--text3);letter-spacing:.1em;margin-top:4px">INITIALIZING SYSTEM</span></div>';
  else if(S.screen==='setup')app.innerHTML=renderSetup();
  else if(S.screen==='login')app.innerHTML=renderLogin();
  else if(S.screen==='app')app.innerHTML=renderApp();
}

async function start(){
  render();
  let cfg=FIREBASE_CONFIG;
  const saved=localStorage.getItem('inv_firebase_config');
  if(saved){try{cfg=JSON.parse(saved);}catch(e){}}
  if(!cfg.apiKey||!cfg.projectId){S.screen='setup';render();return;}
  if(!initFB(cfg)){S.screen='setup';render();return;}
  try{await seedDB();S.screen='login';render();}
  catch(e){console.error(e);S.screen='setup';S.configError='Could not connect to Firebase. Check your config and make sure Firestore is enabled in test mode.';render();}
}
start();
</script>
</body>
</html>
